<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatórios de Velocity por Squad</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --blue-dark: #1F4E79;
    --blue-mid: #2E75B6;
    --blue-light: #BDD7EE;
    --blue-xlight: #DEEAF1;
    --green: #70AD47;
    --orange: #ED7D31;
    --red: #FF0000;
    --gray: #595959;
    --gray-light: #F2F7FC;
    --border: #D6E4F0;
    --text: #1a1a2e;
    --white: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: var(--text); font-size: 14px; }

  .nav { background: var(--blue-dark); color: white; padding: 0 32px; display: flex; align-items: center; height: 56px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.3); flex-wrap: wrap; gap: 8px; }
  .nav h1 { font-size: 18px; font-weight: 700; letter-spacing: .5px; white-space: nowrap; }
  .nav .date { margin-left: auto; font-size: 12px; opacity: .7; }
  .nav-links { display: flex; gap: 4px; margin-left: 32px; }
  .nav-links a { color: rgba(255,255,255,.75); text-decoration: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; transition: .15s; }
  .nav-links a:hover { background: rgba(255,255,255,.15); color: white; }

  .container { max-width: 1400px; margin: 0 auto; padding: 28px 24px 60px; }

  .filters {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    background: white; border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 20px; margin-bottom: 24px;
    box-shadow: 0 1px 6px rgba(0,0,0,.08);
  }
  .filters label { font-size: 11px; color: var(--gray); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .filters select {
    border: 1px solid var(--border); background: #fff; color: var(--text);
    border-radius: 8px; height: 36px; padding: 0 12px; font-size: 13px; min-width: 180px;
    cursor: pointer;
  }
  .filters select:focus { outline: 2px solid var(--blue-mid); border-color: var(--blue-mid); }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .card { background: white; border-radius: 10px; padding: 20px 24px; box-shadow: 0 1px 6px rgba(0,0,0,.08); border-top: 4px solid var(--blue-mid); }
  .card.green { border-color: var(--green); }
  .card.orange { border-color: var(--orange); }
  .card.red { border-color: #D44; }
  .card label { font-size: 11px; text-transform: uppercase; letter-spacing: .8px; color: var(--gray); font-weight: 600; }
  .card .value { font-size: 32px; font-weight: 800; color: var(--blue-dark); margin: 6px 0 2px; line-height: 1; }
  .card.green .value { color: #375623; }
  .card .sub { font-size: 12px; color: var(--gray); }

  .section { margin-bottom: 36px; }
  .section-title { font-size: 17px; font-weight: 700; color: var(--blue-dark); border-left: 4px solid var(--blue-mid); padding-left: 12px; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
  .section-title .badge { background: var(--blue-xlight); color: var(--blue-dark); font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }

  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 32px; }
  .chart-grid.single { grid-template-columns: 1fr; }
  .chart-box { background: white; border-radius: 10px; padding: 20px 24px; box-shadow: 0 1px 6px rgba(0,0,0,.08); }
  .chart-box h3 { font-size: 13px; font-weight: 700; color: var(--blue-dark); margin-bottom: 14px; text-transform: uppercase; letter-spacing: .5px; }
  .chart-box canvas { max-height: 320px; }

  .table-wrap { background: white; border-radius: 10px; box-shadow: 0 1px 6px rgba(0,0,0,.08); overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: var(--blue-dark); color: white; }
  thead th { padding: 11px 14px; text-align: center; font-weight: 600; font-size: 12px; white-space: nowrap; cursor: pointer; }
  thead th:first-child { text-align: left; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:hover { background: var(--blue-xlight); }
  tbody tr:nth-child(even) { background: var(--gray-light); }
  tbody tr:nth-child(even):hover { background: var(--blue-xlight); }
  td { padding: 9px 14px; text-align: center; white-space: nowrap; }
  td:first-child { text-align: left; }
  .total-row td { background: var(--blue-dark) !important; color: white; font-weight: 700; font-size: 13px; }

  .pts { font-weight: 700; color: var(--blue-dark); }
  .zero { color: #CCCCCC; }
  .sprint-name { font-weight: 600; color: var(--blue-mid); }
  .assignee-name { font-weight: 600; white-space: nowrap; }
  .total-cell { background: var(--blue-xlight) !important; font-weight: 800 !important; font-size: 14px !important; }

  .badge-pos { background: #E2EFDA; color: #375623; border-radius: 4px; padding: 2px 7px; font-size: 12px; font-weight: 700; white-space: nowrap; }
  .badge-neg { background: #FFE0E0; color: #9C0006; border-radius: 4px; padding: 2px 7px; font-size: 12px; font-weight: 700; white-space: nowrap; }
  .badge-neu { background: #FFF3CD; color: #856404; border-radius: 4px; padding: 2px 7px; font-size: 12px; font-weight: 700; white-space: nowrap; }
  .badge-na  { background: #EEEEEE; color: #888; border-radius: 4px; padding: 2px 7px; font-size: 12px; font-style: italic; }

  .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; flex-shrink: 0; }

  .bar-wrap { background: #eee; border-radius: 4px; height: 20px; overflow: hidden; min-width: 80px; max-width: 160px; }
  .bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 6px; color: white; font-size: 11px; font-weight: 700; min-width: 30px; transition: width .5s; }

  .scroll-hint { font-size: 11px; color: var(--gray); margin-bottom: 6px; font-style: italic; }

  footer { text-align: center; color: #888; font-size: 12px; padding: 24px; }

  #loading { padding: 60px; text-align: center; color: var(--gray); font-size: 15px; }
  #loading .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--blue-mid); border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { background: #FFF5F5; border: 1px solid #FED7D7; border-radius: 10px; padding: 20px; color: #9C0006; text-align: center; }
  .error-box code { background: #FFE0E0; padding: 2px 6px; border-radius: 4px; font-size: 12px; }

  @media (max-width: 900px) { .chart-grid { grid-template-columns: 1fr; } .nav { padding: 0 16px; } }
</style>
</head>
<body>

<nav class="nav">
  <h1>Relatórios de Velocity por Squad</h1>
  <div class="nav-links">
    <a href="#resumo">Resumo</a>
    <a href="#velocity">Velocity</a>
    <a href="#distribuicao">Distribuição</a>
    <a href="#capacidade">Capacidade</a>
    <a href="#crescimento">Crescimento</a>
  </div>
  <span class="date" id="navDate">Gerado em —</span>
</nav>

<div class="container">
  <div class="filters">
    <label for="squadSelect">Squad</label>
    <select id="squadSelect"><option>Carregando...</option></select>
    <span style="width:1px;height:24px;background:var(--border);margin:0 4px"></span>
    <label for="periodoSelect">Período</label>
    <select id="periodoSelect">
      <option value="1">Atual (última sprint)</option>
      <option value="6">Últimas 6 sprints</option>
      <option value="12">Últimas 12 sprints</option>
      <option value="0" selected>Todas</option>
    </select>
  </div>

  <div id="loading"><div class="spinner"></div><br>Carregando dados da squad...</div>
  <div id="report" style="display:none"></div>
</div>

<footer id="footerEl"></footer>

<script>
const PALETTE = ["#2E75B6","#70AD47","#ED7D31","#A5A5A5","#FFC000","#4472C4","#FF0000","#B4C6E7","#E2EFDA","#FFE699","#9966FF","#FF6699","#33CCCC","#CC9900","#8B5CF6"];
let charts = [];
let fullData = null;

function filterData(data, windowSize) {
  if (!windowSize || windowSize <= 0 || windowSize >= data.sprints.length) return data;
  const n = windowSize;
  const sprints = data.sprints.slice(-n);
  const offset = data.sprints.length - n;
  const assignees = data.assignees.map(a => {
    const sliced = a.pointsBySprint.slice(offset);
    const total = sliced.reduce((s, v) => s + v, 0);
    const active = sliced.filter(v => v > 0).length;
    return { ...a, pointsBySprint: sliced, totalPoints: total, sprintsActive: active,
      avgPerSprint: active ? Math.round(total / active * 10) / 10 : 0 };
  }).filter(a => a.totalPoints > 0 || a.pointsBySprint.some(v => v > 0));
  assignees.sort((a, b) => b.totalPoints - a.totalPoints);
  const totalPts = sprints.reduce((s, sp) => s + sp.points, 0);
  assignees.forEach(a => { a.teamPct = totalPts ? Math.round(a.totalPoints / totalPts * 1000) / 10 : 0; });
  const totalIssues = sprints.reduce((s, sp) => s + sp.issues, 0);
  return {
    ...data,
    sprints,
    assignees,
    meta: { ...data.meta, totalSprints: sprints.length, totalPoints: totalPts, totalIssues,
      velocityAvg: sprints.length ? Math.round(totalPts / sprints.length) : 0 }
  };
}

function destroyCharts() { charts.forEach(c => c.destroy()); charts = []; }

function badgeGrowth(v) {
  if (v === null || v === undefined) return '<span class="badge-na">N/A</span>';
  if (v > 0) return `<span class="badge-pos">▲ +${v.toFixed(1)}%</span>`;
  if (v < 0) return `<span class="badge-neg">▼ ${v.toFixed(1)}%</span>`;
  return '<span class="badge-neu">0.0%</span>';
}

function cellPts(v) {
  return v ? `<td class="pts">${v}</td>` : '<td class="zero">—</td>';
}

function assigneeGrowthBySprint(assignee) {
  const arr = assignee.pointsBySprint;
  return arr.map((v, i) => {
    if (i === 0) return null;
    const prev = arr[i - 1];
    if (!prev && !v) return null;
    if (!prev) return null;
    if (!v) return -100;
    return Math.round(((v - prev) / prev) * 1000) / 10;
  });
}

function avgGrowth(growthArr) {
  const valid = growthArr.filter(v => v !== null);
  if (!valid.length) return null;
  return Math.round((valid.reduce((a, b) => a + b, 0) / valid.length) * 10) / 10;
}

function render(data) {
  destroyCharts();
  const el = document.getElementById('report');
  const meta = data.meta;
  const sprints = data.sprints;
  const assignees = data.assignees;
  const issueTypes = data.issueTypes;
  const sprintLabels = sprints.map(s => "S " + s.id);
  const velocityData = sprints.map(s => s.points);
  const growthData = sprints.map(s => s.growth);
  const topContributor = assignees[0];
  const lastSprint = sprints[sprints.length - 1];
  const lastGrowth = lastSprint ? lastSprint.growth : null;
  const lastGrowthStr = lastGrowth === null ? 'N/A' : (lastGrowth > 0 ? '▲ +' : lastGrowth < 0 ? '▼ ' : '') + (lastGrowth !== null ? lastGrowth.toFixed(1) + '%' : '');
  const lastGrowthClass = lastGrowth === null ? '' : lastGrowth > 0 ? 'green' : lastGrowth < 0 ? 'red' : 'orange';

  document.getElementById('navDate').textContent = `Gerado em ${meta.generatedAt}`;

  let html = '';

  // CARDS
  html += `<div class="cards" id="resumo">
    <div class="card"><label>Sprints Analisadas</label><div class="value">${meta.totalSprints}</div><div class="sub">Sprint ${sprints[0]?.id || '?'} → Sprint ${lastSprint?.id || '?'}</div></div>
    <div class="card"><label>Total de Pontos</label><div class="value">${meta.totalPoints}</div><div class="sub">${meta.totalIssues} issues entregues</div></div>
    <div class="card green"><label>Velocity Médio</label><div class="value">${meta.velocityAvg}</div><div class="sub">pontos/sprint</div></div>
    <div class="card ${lastGrowthClass}"><label>Última Variação</label><div class="value" style="font-size:24px">${lastGrowthStr}</div><div class="sub">Sprint anterior</div></div>
    <div class="card"><label>Responsáveis</label><div class="value">${assignees.length}</div><div class="sub">desenvolvedores ativos</div></div>
    <div class="card green"><label>Top Contributor</label><div class="value" style="font-size:16px;line-height:1.3">${topContributor ? topContributor.name.split(' ')[0] : '—'}</div><div class="sub">${topContributor ? topContributor.totalPoints + ' pts (' + topContributor.teamPct + '% do total)' : ''}</div></div>
  </div>`;

  // VELOCITY CHARTS
  html += `<div class="section" id="velocity">
    <div class="section-title">Velocity do Time <span class="badge">${meta.totalSprints} sprints</span></div>
    <div class="chart-grid">
      <div class="chart-box"><h3>Pontos Entregues por Sprint</h3><canvas id="chartVelocity"></canvas></div>
      <div class="chart-box"><h3>Crescimento % Sprint a Sprint (Time)</h3><canvas id="chartGrowth"></canvas></div>
    </div>
  </div>`;

  // SPRINT TABLE
  html += `<div class="section">
    <div class="section-title">Resumo por Sprint</div>
    <div class="table-wrap"><table><thead><tr>
      <th>Sprint</th><th>Início</th><th>Fim</th><th>Conclusão</th><th>Pontos</th><th>Issues</th><th>Crescimento</th>
    </tr></thead><tbody>`;
  for (const s of sprints) {
    html += `<tr>
      <td class="sprint-name">${s.name}</td>
      <td>${s.start || '—'}</td><td>${s.end || '—'}</td><td>${s.completedAt || '—'}</td>
      <td class="pts">${s.points}</td><td>${s.issues}</td><td>${badgeGrowth(s.growth)}</td>
    </tr>`;
  }
  html += `</tbody></table></div></div>`;

  // DISTRIBUTION CHARTS
  html += `<div class="section" id="distribuicao">
    <div class="section-title">Distribuição de Entregas <span class="badge">por responsável</span></div>
    <div class="chart-grid">
      <div class="chart-box"><h3>Contribuição por Responsável (Barras Empilhadas)</h3><canvas id="chartStacked"></canvas></div>
      <div class="chart-box"><h3>Tipo de Issue Entregue</h3><canvas id="chartTypes"></canvas></div>
    </div>
  </div>`;

  // MATRIX TABLE
  html += `<div class="section">
    <div class="section-title">Matriz Responsável × Sprint <span class="badge">story points</span></div>
    <div class="scroll-hint">← Deslize para ver todas as sprints →</div>
    <div class="table-wrap"><table><thead><tr><th>Responsável</th>`;
  for (const l of sprintLabels) html += `<th>${l}</th>`;
  html += `<th>TOTAL</th></tr></thead><tbody>`;
  for (let ai = 0; ai < assignees.length; ai++) {
    const a = assignees[ai];
    const color = PALETTE[ai % PALETTE.length];
    html += `<tr><td class="assignee-name"><span class="dot" style="background:${color}"></span>${a.name}</td>`;
    for (const v of a.pointsBySprint) html += cellPts(v);
    html += `<td class="pts total-cell">${a.totalPoints}</td></tr>`;
  }
  // Total row
  html += `<tr class="total-row"><td>TOTAL SPRINT</td>`;
  for (let si = 0; si < sprints.length; si++) {
    const total = assignees.reduce((sum, a) => sum + (a.pointsBySprint[si] || 0), 0);
    html += `<td class="pts">${total}</td>`;
  }
  html += `<td>${meta.totalPoints}</td></tr></tbody></table></div></div>`;

  // CAPACITY SECTION
  html += `<div class="section" id="capacidade">
    <div class="section-title">Capacidade por Desenvolvedor</div>
    <div class="chart-grid">
      <div class="chart-box"><h3>Tendência de Pontos por Sprint (por Responsável)</h3><canvas id="chartLines"></canvas></div>
      <div class="chart-box"><h3>Participação Total no Time</h3><canvas id="chartDonut"></canvas></div>
    </div>
    <div class="table-wrap" style="margin-top:20px"><table><thead><tr>
      <th>Responsável</th><th>Total Pontos</th><th>Sprints Participadas</th><th>Média / Sprint</th><th>% do Time</th><th>Crescimento Médio</th>
    </tr></thead><tbody>`;
  for (let ai = 0; ai < assignees.length; ai++) {
    const a = assignees[ai];
    const color = PALETTE[ai % PALETTE.length];
    const gArr = assigneeGrowthBySprint(a);
    const avgG = avgGrowth(gArr);
    const pctWidth = Math.max(a.teamPct, 1);
    html += `<tr>
      <td class="assignee-name"><span class="dot" style="background:${color}"></span>${a.name}</td>
      <td class="pts">${a.totalPoints}</td>
      <td>${a.sprintsActive}</td>
      <td class="pts">${a.avgPerSprint}</td>
      <td><div class="bar-wrap"><div class="bar-fill" style="width:${pctWidth}%;background:${color}">${a.teamPct}%</div></div></td>
      <td>${badgeGrowth(avgG)}</td>
    </tr>`;
  }
  html += `</tbody></table></div></div>`;

  // GROWTH MATRIX
  html += `<div class="section" id="crescimento">
    <div class="section-title">Crescimento % por Responsável e Sprint</div>
    <div class="chart-grid single">
      <div class="chart-box"><h3>Variação Sprint a Sprint por Responsável</h3><canvas id="chartGrowthLines"></canvas></div>
    </div>
    <div class="scroll-hint" style="margin-top:20px">← Deslize para ver todas as sprints →</div>
    <div class="table-wrap"><table><thead><tr><th>Responsável</th>`;
  for (const l of sprintLabels) html += `<th>${l}</th>`;
  html += `</tr></thead><tbody>`;
  for (let ai = 0; ai < assignees.length; ai++) {
    const a = assignees[ai];
    const color = PALETTE[ai % PALETTE.length];
    const gArr = assigneeGrowthBySprint(a);
    html += `<tr><td class="assignee-name"><span class="dot" style="background:${color}"></span>${a.name}</td>`;
    for (const v of gArr) html += `<td>${badgeGrowth(v)}</td>`;
    html += `</tr>`;
  }
  html += `</tbody></table></div></div>`;

  // FOOTER
  document.getElementById('footerEl').textContent =
    `${meta.squadKey} ${meta.squadName} Board ${meta.boardId} — ${meta.totalIssues} issues | ${meta.totalSprints} sprints | ${meta.totalPoints} story points | Gerado em ${meta.generatedAt}`;

  el.innerHTML = html;
  el.style.display = 'block';

  // ── CHARTS ──

  const defaultFont = { family: "'Segoe UI', Arial, sans-serif", size: 11 };
  Chart.defaults.font = defaultFont;
  Chart.defaults.color = '#595959';

  // 1. Velocity bar
  charts.push(new Chart(document.getElementById('chartVelocity'), {
    type: 'bar',
    data: {
      labels: sprintLabels,
      datasets: [
        { label: 'Pontos Entregues', data: velocityData, backgroundColor: 'rgba(46,117,182,0.75)', borderColor: '#1F4E79', borderWidth: 1 }
      ]
    },
    options: { responsive: true, plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } }, scales: { x: { grid: { display: false }, ticks: { maxRotation: 45 } }, y: { beginAtZero: true, title: { display: true, text: 'Story Points' } } } }
  }));

  // 2. Growth %
  charts.push(new Chart(document.getElementById('chartGrowth'), {
    type: 'bar',
    data: {
      labels: sprintLabels,
      datasets: [{
        label: 'Crescimento %', data: growthData,
        backgroundColor: growthData.map(v => v === null ? '#ccc' : v > 0 ? 'rgba(112,173,71,0.75)' : v < 0 ? 'rgba(255,0,0,0.5)' : 'rgba(255,192,0,0.6)'),
        borderColor: growthData.map(v => v === null ? '#ccc' : v > 0 ? '#375623' : v < 0 ? '#9C0006' : '#856404'),
        borderWidth: 1
      }]
    },
    options: { responsive: true, plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.raw !== null ? (ctx.raw > 0 ? '+' : '') + ctx.raw.toFixed(1) + '%' : 'N/A' } } }, scales: { x: { grid: { display: false }, ticks: { maxRotation: 45 } }, y: { title: { display: true, text: 'Variação (%)' }, ticks: { callback: v => v + '%' } } } }
  }));

  // 3. Stacked bar
  const stackedDS = assignees.slice(0, 12).map((a, i) => ({
    label: a.name, data: a.pointsBySprint,
    backgroundColor: PALETTE[i % PALETTE.length], borderColor: PALETTE[i % PALETTE.length], borderWidth: 1
  }));
  charts.push(new Chart(document.getElementById('chartStacked'), {
    type: 'bar',
    data: { labels: sprintLabels, datasets: stackedDS },
    options: { responsive: true, plugins: { legend: { position: 'right', labels: { boxWidth: 12, font: { size: 10 } } }, tooltip: { mode: 'index', intersect: false } }, scales: { x: { stacked: true, grid: { display: false }, ticks: { maxRotation: 45 } }, y: { stacked: true, title: { display: true, text: 'Story Points' } } } }
  }));

  // 4. Issue types donut
  charts.push(new Chart(document.getElementById('chartTypes'), {
    type: 'doughnut',
    data: {
      labels: issueTypes.map(t => t.label),
      datasets: [{ data: issueTypes.map(t => t.count), backgroundColor: PALETTE.slice(0, issueTypes.length), borderWidth: 2, borderColor: '#fff' }]
    },
    options: { responsive: true, cutout: '60%', plugins: { legend: { position: 'right', labels: { boxWidth: 12, font: { size: 11 } } }, tooltip: { callbacks: { label: ctx => ctx.label + ': ' + ctx.raw + ' issues' } } } }
  }));

  // 5. Lines per assignee
  const lineDS = assignees.slice(0, 12).map((a, i) => ({
    label: a.name, data: a.pointsBySprint,
    borderColor: PALETTE[i % PALETTE.length], backgroundColor: PALETTE[i % PALETTE.length] + '22',
    tension: 0.3, fill: false, pointRadius: 4, borderWidth: 2
  }));
  charts.push(new Chart(document.getElementById('chartLines'), {
    type: 'line',
    data: { labels: sprintLabels, datasets: lineDS },
    options: { responsive: true, plugins: { legend: { position: 'right', labels: { boxWidth: 12, font: { size: 10 } } }, tooltip: { mode: 'index', intersect: false } }, scales: { x: { grid: { display: false }, ticks: { maxRotation: 45 } }, y: { beginAtZero: true, title: { display: true, text: 'Story Points' } } } }
  }));

  // 6. Participation donut
  charts.push(new Chart(document.getElementById('chartDonut'), {
    type: 'doughnut',
    data: {
      labels: assignees.map(a => a.name),
      datasets: [{ data: assignees.map(a => a.totalPoints), backgroundColor: assignees.map((_, i) => PALETTE[i % PALETTE.length]), borderWidth: 2, borderColor: '#fff' }]
    },
    options: { responsive: true, cutout: '55%', plugins: { legend: { position: 'right', labels: { boxWidth: 12, font: { size: 10 } } }, tooltip: { callbacks: { label: ctx => ctx.label + ': ' + ctx.raw + ' pts' } } } }
  }));

  // 7. Growth lines per assignee
  const growthLineDS = assignees.slice(0, 12).map((a, i) => ({
    label: a.name, data: assigneeGrowthBySprint(a),
    borderColor: PALETTE[i % PALETTE.length], backgroundColor: 'transparent',
    tension: 0.3, fill: false, pointRadius: 4, borderWidth: 2, spanGaps: true
  }));
  charts.push(new Chart(document.getElementById('chartGrowthLines'), {
    type: 'line',
    data: { labels: sprintLabels, datasets: growthLineDS },
    options: { responsive: true, plugins: { legend: { position: 'right', labels: { boxWidth: 12, font: { size: 10 } } }, tooltip: { mode: 'index', intersect: false, callbacks: { label: ctx => ctx.dataset.label + ': ' + (ctx.raw !== null ? (ctx.raw > 0 ? '+' : '') + ctx.raw.toFixed(1) + '%' : 'N/A') } } }, scales: { x: { grid: { display: false }, ticks: { maxRotation: 45 } }, y: { title: { display: true, text: 'Variação (%)' }, ticks: { callback: v => v + '%' } } } }
  }));
}

function showLoading(msg) {
  document.getElementById('loading').innerHTML = `<div class="spinner"></div><br>${msg}`;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('report').style.display = 'none';
}

function showError(msg) {
  document.getElementById('loading').innerHTML = `<div class="error-box">${msg}</div>`;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('report').style.display = 'none';
}

function getWindowSize() {
  return parseInt(document.getElementById('periodoSelect').value, 10);
}

function renderFiltered() {
  if (!fullData) return;
  const filtered = filterData(fullData, getWindowSize());
  render(filtered);
  const url = new URL(window.location.href);
  url.searchParams.set('periodo', getWindowSize());
  history.replaceState(null, '', url);
}

async function loadSquadData(key) {
  showLoading(`Carregando dados da squad <strong>${key}</strong>...`);
  try {
    const resp = await fetch(`./data/${key}-data.json`);
    if (!resp.ok) throw new Error(`Arquivo <code>data/${key}-data.json</code> não encontrado.<br><br>Execute o script de coleta para gerar os dados:<br><code>python scripts/fetch-jira-data.py --squad ${key}</code>`);
    fullData = await resp.json();
    document.getElementById('loading').style.display = 'none';
    renderFiltered();
    const url = new URL(window.location.href);
    url.searchParams.set('squad', key);
    url.searchParams.set('periodo', getWindowSize());
    history.replaceState(null, '', url);
  } catch (err) {
    showError(err.message);
  }
}

async function init() {
  try {
    const resp = await fetch('./config/squads.json');
    if (!resp.ok) throw new Error('Não foi possível carregar config/squads.json');
    const squads = await resp.json();
    const select = document.getElementById('squadSelect');
    select.innerHTML = squads.map(s => `<option value="${s.key}">${s.name} (${s.key})</option>`).join('');

    select.addEventListener('change', () => loadSquadData(select.value));
    document.getElementById('periodoSelect').addEventListener('change', renderFiltered);

    const url = new URL(window.location.href);
    const periodoParam = url.searchParams.get('periodo');
    if (periodoParam) {
      const periodoSelect = document.getElementById('periodoSelect');
      const validOpts = [...periodoSelect.options].map(o => o.value);
      if (validOpts.includes(periodoParam)) periodoSelect.value = periodoParam;
    }
    const requested = url.searchParams.get('squad');
    const exists = squads.some(s => s.key === requested);
    const initial = exists ? requested : squads[0]?.key;
    if (initial) {
      select.value = initial;
      await loadSquadData(initial);
    }
  } catch (err) {
    showError(`Erro na inicialização: ${err.message}`);
  }
}

init();
</script>

</html>
